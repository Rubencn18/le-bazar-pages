<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Le Bazar — Prise de commande</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a0a; --surface:#111; --surface2:#181818; --surface3:#1f1f1f;
      --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
      --text:#fff; --muted:#888; --orange:#ff6614; --orange-dim:rgba(255,102,20,0.15);
      --green:#4caf7d; --red:#e05050; --radius:6px;
    }
    html,body{height:100%;font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;overflow:hidden}
    button{cursor:pointer;font-family:inherit}

    /* ── LOGIN ── */
    #screen-login{display:flex;align-items:center;justify-content:center;height:100vh;background:#000}
    .login-box{width:340px;border:1px solid var(--border2);padding:40px 32px}
    .login-box::before{content:'';display:block;text-align:center;font-size:26px;font-weight:800;letter-spacing:6px;margin-bottom:4px}
    .login-title{text-align:center;font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px}
    .login-box label{display:block;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
    .login-box input{width:100%;padding:11px 13px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);color:var(--text);font-size:13px;font-family:inherit;outline:none;margin-bottom:16px;transition:border-color .2s}
    .login-box input:focus{border-color:var(--orange)}
    .login-box button{width:100%;padding:12px;background:transparent;border:1px solid #fff;color:#fff;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;transition:all .2s;margin-top:4px}
    .login-box button:hover{background:var(--orange);border-color:var(--orange)}
    #login-err{color:var(--red);font-size:11px;text-align:center;margin-top:12px;min-height:16px}

    /* ── APP ── */
    #screen-app{display:none;flex-direction:column;height:100vh}

    /* ── HEADER ── */
    #app-header{
      height:54px;background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;
    }
    .hdr-logo{font-size:15px;font-weight:800;letter-spacing:4px}
    .hdr-info{font-size:11px;color:var(--muted);display:flex;gap:12px;align-items:center}
    .hdr-table{color:var(--orange);font-weight:700}
    .hdr-serveur{color:var(--muted)}
    .btn-change-table{background:transparent;border:1px solid var(--border2);color:var(--muted);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;transition:all .15s}
    .btn-change-table:hover{border-color:var(--orange);color:var(--orange)}

    /* ── BODY ── */
    #app-body{display:flex;flex:1;overflow:hidden}

    /* ── MENU SIDE ── */
    #menu-side{
      flex:1;display:flex;flex-direction:column;overflow:hidden;
      border-right:1px solid var(--border);
    }

    /* ── CAT NAV ── */
    #cat-nav{
      display:flex;gap:6px;padding:10px 12px;overflow-x:auto;flex-shrink:0;
      border-bottom:1px solid var(--border);background:var(--surface);
      scrollbar-width:none;
    }
    #cat-nav::-webkit-scrollbar{display:none}
    .cat-btn{
      flex-shrink:0;padding:6px 18px;background:transparent;border:1px solid var(--border2);
      border-radius:20px;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:1px;
      text-transform:uppercase;transition:all .2s;white-space:nowrap;
    }
    .cat-btn.active{
      background:linear-gradient(135deg,var(--orange),#ff9500);
      border-color:transparent;color:#fff;
      box-shadow:0 0 14px rgba(255,102,20,0.5);
    }
    .cat-btn:hover:not(.active){border-color:var(--orange);color:var(--orange)}

    /* ── ITEMS GRID ── */
    #items-grid{
      flex:1;overflow-y:auto;padding:12px;
      display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;
      align-content:start;
    }
    @property --angle{syntax:'<angle>';initial-value:0deg;inherits:false}
    @keyframes card-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes border-spin{to{--angle:360deg}}

    .item-card{
      background:var(--surface2);border:1px solid var(--border);
      padding:14px 12px;cursor:pointer;border-radius:8px;
      display:flex;flex-direction:column;gap:4px;position:relative;
      animation:card-in .25s ease both;
      transition:transform .2s,box-shadow .2s;
    }
    .item-card:hover{
      transform:scale(1.02);
      border-color:transparent;
      background-image:linear-gradient(var(--surface3),var(--surface3)),
        conic-gradient(from var(--angle),transparent 30%,var(--orange) 45%,#ff9500 55%,var(--orange) 65%,transparent 80%);
      background-origin:border-box;background-clip:padding-box,border-box;
      animation:card-in .25s ease both,border-spin 2s linear infinite;
      box-shadow:0 4px 20px rgba(255,102,20,0.2);
    }
    .item-card.in-cart{
      border-color:transparent;
      background-image:linear-gradient(var(--orange-dim),var(--orange-dim)),
        conic-gradient(from var(--angle),transparent 30%,var(--orange) 45%,#ff9500 55%,var(--orange) 65%,transparent 80%);
      background-origin:border-box;background-clip:padding-box,border-box;
      animation:border-spin 1.5s linear infinite;
      box-shadow:0 0 16px rgba(255,102,20,0.35);
    }
    .item-card.dispo-false{opacity:.4;cursor:not-allowed}

    .item-emoji{font-size:22px;margin-bottom:4px}
    .item-nom{font-size:12px;font-weight:600;line-height:1.3}
    .item-desc{font-size:10px;color:var(--muted);line-height:1.4;margin-top:2px}
    .item-prix{
      display:inline-block;margin-top:auto;padding-top:8px;
      font-size:12px;font-weight:700;color:#fff;
      background:linear-gradient(135deg,var(--orange),#ff9500);
      border-radius:12px;padding:3px 10px;margin-top:8px;align-self:flex-start;
    }
    .item-qty-badge{
      position:absolute;top:7px;right:8px;z-index:2;
      background:linear-gradient(135deg,var(--orange),#ff9500);color:#fff;border-radius:50%;
      width:22px;height:22px;font-size:11px;font-weight:700;
      display:none;align-items:center;justify-content:center;
      box-shadow:0 2px 8px rgba(255,102,20,0.6);
    }

    /* ── CART SIDE ── */
    #cart-side{
      width:300px;flex-shrink:0;display:flex;flex-direction:column;
      background:var(--surface);
    }
    .cart-header{
      padding:14px 16px;border-bottom:1px solid var(--border);
      font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
      display:flex;align-items:center;justify-content:space-between;
    }
    .cart-count{color:var(--orange)}
    #cart-items{flex:1;overflow-y:auto;padding:8px}
    .cart-empty-msg{text-align:center;padding:40px 20px;color:var(--muted);font-size:12px}
    .cart-row{
      display:flex;align-items:flex-start;gap:8px;padding:10px 8px;
      border-bottom:1px solid var(--border);
    }
    .cart-row-info{flex:1}
    .cart-row-nom{font-size:12px;font-weight:600;margin-bottom:2px}
    .cart-row-prix{font-size:11px;color:var(--orange)}
    .cart-row-note{
      width:100%;margin-top:6px;padding:5px 8px;
      background:rgba(255,255,255,0.04);border:1px solid var(--border);
      color:var(--text);font-size:11px;font-family:inherit;outline:none;resize:none;
      transition:border-color .15s;
    }
    .cart-row-note:focus{border-color:var(--orange)}
    .cart-row-note::placeholder{color:var(--muted)}
    .qty-ctrl{display:flex;align-items:center;gap:6px;margin-top:6px}
    .qty-btn{
      width:24px;height:24px;background:var(--surface3);border:1px solid var(--border2);
      color:var(--text);font-size:15px;display:flex;align-items:center;justify-content:center;
      transition:all .15s;
    }
    .qty-btn:hover{border-color:var(--orange);color:var(--orange)}
    .qty-val{font-size:13px;font-weight:600;min-width:20px;text-align:center}
    .qty-del{background:transparent;border:none;color:var(--red);font-size:15px;margin-left:4px;padding:2px}
    .cart-footer{border-top:1px solid var(--border);padding:12px 16px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
    .cart-total-row{display:flex;justify-content:space-between;align-items:center}
    .cart-total-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
    .cart-total-val{font-size:20px;font-weight:700;color:var(--orange)}
    #cart-notes{
      width:100%;padding:8px 10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);
      color:var(--text);font-size:12px;font-family:inherit;outline:none;resize:none;height:54px;
      transition:border-color .15s;
    }
    #cart-notes:focus{border-color:var(--orange)}
    #cart-notes::placeholder{color:var(--muted)}
    #btn-send{
      padding:13px;background:var(--orange);border:none;color:#fff;
      font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
      transition:opacity .2s;
    }
    #btn-send:hover{opacity:.85}
    #btn-send:disabled{opacity:.4;cursor:not-allowed}
    #btn-clear{
      padding:8px;background:transparent;border:1px solid var(--border2);color:var(--muted);
      font-size:10px;letter-spacing:1px;text-transform:uppercase;transition:all .15s;
    }
    #btn-clear:hover{border-color:var(--red);color:var(--red)}

    /* ── TABLE SELECT MODAL ── */
    #modal-table{
      display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
      z-index:999;align-items:center;justify-content:center;
    }
    #modal-table.open{display:flex}
    .modal-box{
      background:var(--surface);border:1px solid var(--border2);
      padding:32px 28px;width:320px;
    }
    .modal-title{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
    .modal-box input{
      width:100%;padding:11px 13px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);
      color:var(--text);font-size:16px;font-family:inherit;outline:none;margin-bottom:12px;
      text-align:center;font-weight:700;letter-spacing:3px;transition:border-color .2s;
    }
    .modal-box input:focus{border-color:var(--orange)}
    .modal-hint{font-size:11px;color:var(--muted);margin-bottom:20px;text-align:center}
    .modal-row{display:flex;gap:8px}
    .modal-btn{
      flex:1;padding:11px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
      transition:all .15s;
    }
    .modal-btn-confirm{background:var(--orange);border:1px solid var(--orange);color:#fff}
    .modal-btn-confirm:hover{opacity:.85}
    .modal-btn-cancel{background:transparent;border:1px solid var(--border2);color:var(--muted)}
    .modal-btn-cancel:hover{border-color:var(--red);color:var(--red)}

    /* ── NOTE MODAL ── */
    #modal-note{
      display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
      z-index:999;align-items:center;justify-content:center;
    }
    #modal-note.open{display:flex}

    /* ── PLAN DE SALLE ── */
    #screen-salle{
      display:none;flex-direction:column;align-items:center;justify-content:center;
      min-height:100vh;background:#000;padding:32px 20px;
    }
    .salle-title{font-size:22px;font-weight:800;letter-spacing:6px;margin-bottom:4px;text-align:center}
    .salle-sub{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;text-align:center}
    .salle-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      width:100%;max-width:520px;
    }
    .table-card{
      aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      border:1px solid var(--border2);cursor:pointer;transition:all .2s;gap:4px;
      background:var(--surface);position:relative;
    }
    .table-card:hover{border-color:var(--orange);transform:scale(1.04);}
    .table-card.occupee{border-color:var(--orange);background:var(--orange-dim);}
    .table-card.occupee::after{content:'●';position:absolute;top:6px;right:8px;font-size:8px;color:var(--orange);}
    .table-card.reservee{border-color:#60a5fa;background:rgba(96,165,250,0.08);}
    .table-card.reservee::after{content:'◆';position:absolute;top:6px;right:8px;font-size:8px;color:#60a5fa;}
    .table-card-nom{font-size:18px;font-weight:800;letter-spacing:1px;}
    .table-card-status{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
    .table-card.occupee .table-card-status{color:var(--orange);}
    .table-card.reservee .table-card-status{color:#60a5fa;}
    .table-card.bar{grid-column:span 2;aspect-ratio:2/1;padding:16px;}
    .salle-legend{display:flex;gap:20px;margin-top:20px;font-size:10px;letter-spacing:1px;color:var(--muted);}
    .legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;}

    /* ── TOAST ── */
    #toast{
      position:fixed;top:70px;left:50%;transform:translateX(-50%);
      background:#1a1a1a;border:1px solid var(--border2);border-left:3px solid var(--green);
      padding:12px 22px;font-size:12px;font-weight:600;letter-spacing:.5px;
      z-index:9999;display:none;white-space:nowrap;
    }
    #toast.error{border-left-color:var(--red)}

    /* ── CONFIRM SCREEN ── */
    #screen-confirm{
      display:none;align-items:center;justify-content:center;
      height:100vh;background:#000;flex-direction:column;gap:16px;text-align:center;padding:40px;
    }
    .confirm-icon{font-size:56px}
    .confirm-title{font-size:20px;font-weight:700;letter-spacing:3px;text-transform:uppercase}
    .confirm-sub{color:var(--muted);font-size:13px}
    .confirm-id{color:var(--orange);font-size:14px;font-weight:700;letter-spacing:2px;margin-top:4px}
    .btn-new-cmd{
      margin-top:16px;padding:13px 32px;background:transparent;border:1px solid #fff;
      color:#fff;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;
      transition:all .2s;
    }
    .btn-new-cmd:hover{background:var(--orange);border-color:var(--orange)}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-box">
    <div style="text-align:center;font-size:22px;font-weight:800;letter-spacing:6px;margin-bottom:4px">LE BAZAR</div>
    <div class="login-title">Prise de commande</div>
    <label>Votre prénom</label>
    <input type="text" id="inp-serveur" placeholder="Ex : Sophie" autocomplete="off"/>
    <label>Code accès</label>
    <input type="password" id="inp-pass" placeholder="••••••"/>
    <button onclick="doLogin()">Accéder →</button>
    <div id="login-err"></div>
  </div>
</div>

<!-- PLAN DE SALLE -->
<div id="screen-salle">
  <div class="salle-title">LE BAZAR</div>
  <div class="salle-sub" id="salle-sub">Choisissez votre table</div>
  <div class="salle-grid" id="salle-grid"></div>
  <div class="salle-legend">
    <span><span class="legend-dot" style="background:var(--border2);border:1px solid var(--border2)"></span>Libre</span>
    <span><span class="legend-dot" style="background:var(--orange)"></span>Occupée</span>
    <span><span class="legend-dot" style="background:#60a5fa"></span>Réservée</span>
  </div>
</div>

<!-- CONFIRM -->
<div id="screen-confirm">
  <div class="confirm-icon">✅</div>
  <div class="confirm-title">Commande envoyée</div>
  <div class="confirm-sub" id="confirm-sub">Table — · Serveur —</div>
  <div class="confirm-id" id="confirm-id"></div>
  <button class="btn-new-cmd" onclick="newCmd()">+ Nouvelle commande</button>
</div>

<!-- APP -->
<div id="screen-app">
  <header id="app-header">
    <div class="hdr-logo">LE BAZAR</div>
    <div class="hdr-info">
      <span class="hdr-table" id="hdr-table">—</span>
      <span class="hdr-serveur" id="hdr-serveur">—</span>
      <button class="btn-change-table" onclick="showSalle(true)">Changer table</button>
    </div>
  </header>

  <div id="app-body">
    <!-- MENU -->
    <div id="menu-side">
      <nav id="cat-nav"></nav>
      <div id="items-grid"></div>
    </div>

    <!-- CART -->
    <div id="cart-side">
      <div class="cart-header">
        <span>Commande</span>
        <span class="cart-count" id="cart-count">0 article</span>
      </div>
      <div id="cart-items">
        <div class="cart-empty-msg">Ajoutez des articles<br>depuis le menu.</div>
      </div>
      <div class="cart-footer">
        <textarea id="cart-notes" placeholder="Note générale pour la cuisine…" rows="2"></textarea>
        <div class="cart-total-row">
          <span class="cart-total-label">Total estimé</span>
          <span class="cart-total-val" id="cart-total">0,00 €</span>
        </div>
        <button id="btn-send" onclick="sendOrder()" disabled>Envoyer en cuisine ↗</button>
        <button id="btn-clear" onclick="clearCart()">Vider le panier</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL TABLE -->
<div id="modal-table">
  <div class="modal-box">
    <div class="modal-title">Sélection de table</div>
    <input type="text" id="modal-table-inp" placeholder="T3, Bar 1, Terrasse…" autocomplete="off"/>
    <div class="modal-hint">Saisissez librement le numéro ou nom de table.</div>
    <div class="modal-row">
      <button class="modal-btn modal-btn-cancel" id="modal-cancel-btn" onclick="closeTableModal()">Annuler</button>
      <button class="modal-btn modal-btn-confirm" onclick="confirmTable()">Confirmer</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const SUPA_URL = 'https://gtjvsrhblqwwnviledmo.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0anZzcmhibHF3d252aWxlZG1vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNjk2NTYsImV4cCI6MjA4OTc0NTY1Nn0.Om-tFf8iIGsTXjWY4l95ApAF6hRP-s5ddsMco_0TPyM';
const ACCESS_CODE = 'bazar2026'; // simple access code

const db = supabase.createClient(SUPA_URL, SUPA_ANON);

let currentServeur = '';
let currentTable   = '';
let menu           = [];   // [{categorie, items:[]}]
let cart           = [];   // [{id, nom, categorie, prix, quantite, note}]
let currentCat     = '';

// ──────────────────────────────────────────
// LOGIN
// ──────────────────────────────────────────
// ── TABLES CONFIG ─────────────────────────
const TABLES = [
  {id:'T1',nom:'T1'},{id:'T2',nom:'T2'},{id:'T3',nom:'T3'},{id:'T4',nom:'T4'},
  {id:'T5',nom:'T5'},{id:'T6',nom:'T6'},{id:'T7',nom:'T7'},{id:'T8',nom:'T8'},
  {id:'T9',nom:'T9'},{id:'T10',nom:'T10'},
  {id:'BAR1',nom:'Bar 1',bar:true},{id:'BAR2',nom:'Bar 2',bar:true},
  // Modifiable : ajoutez/retirez des tables ici
];

function doLogin() {
  const serveur = document.getElementById('inp-serveur').value.trim();
  const pass    = document.getElementById('inp-pass').value;
  const err     = document.getElementById('login-err');

  if (!serveur) { err.textContent = 'Entrez votre prénom.'; return; }
  if (pass !== ACCESS_CODE) { err.textContent = 'Code incorrect.'; return; }

  currentServeur = serveur;
  err.textContent = '';
  showSalle();
}

async function showSalle(changingTable) {
  document.getElementById('screen-login').style.display    = 'none';
  document.getElementById('screen-app').style.display      = 'none';
  document.getElementById('screen-salle').style.display    = 'flex';
  document.getElementById('salle-sub').textContent =
    changingTable ? `${currentServeur} — choisissez une table` : 'Choisissez votre table';

  // Render table cards
  const grid = document.getElementById('salle-grid');
  grid.innerHTML = TABLES.map(t => `
    <div class="table-card${t.bar?' bar':''}" id="tcard-${t.id}" onclick="selectTable('${t.nom}')">
      <div class="table-card-nom">${t.nom}</div>
      <div class="table-card-status" id="tstatus-${t.id}">Libre</div>
    </div>`).join('');

  // Load statuses
  const today = new Date().toISOString().split('T')[0];
  const [{ data: orders }, { data: resas }] = await Promise.all([
    db.from('commandes_salle').select('table_nom').in('statut', ['En attente', 'En préparation', 'Prêt']),
    db.from('reservations').select('table_nom').eq('date_reservation', today).in('statut', ['confirmé','en_attente'])
  ]);

  const occupees  = new Set((orders||[]).map(o => o.table_nom));
  const reservees = new Set((resas||[]).map(r => r.table_nom).filter(n => !occupees.has(n)));

  TABLES.forEach(t => {
    const card   = document.getElementById('tcard-' + t.id);
    const status = document.getElementById('tstatus-' + t.id);
    if (!card) return;
    if (occupees.has(t.nom))  { card.classList.add('occupee');  status.textContent = 'Occupée'; }
    else if (reservees.has(t.nom)) { card.classList.add('reservee'); status.textContent = 'Réservée'; }
  });
}

function selectTable(tableName) {
  currentTable = tableName;
  document.getElementById('screen-salle').style.display = 'none';
  document.getElementById('hdr-table').textContent = tableName;
  initApp();
}

document.getElementById('inp-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ──────────────────────────────────────────
// INIT
// ──────────────────────────────────────────
async function initApp() {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-salle').style.display = 'none';
  document.getElementById('screen-app').style.display   = 'flex';
  document.getElementById('hdr-table').textContent      = currentTable;
  document.getElementById('hdr-serveur').textContent    = currentServeur;
  await loadMenu();
  // Realtime : recharge le menu si la cuisine change la dispo d'un plat
  db.channel('menu-dispo')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'menu' }, () => loadMenu())
    .subscribe();
}

async function loadMenu() {
  const { data, error } = await db.from('menu').select('*').eq('disponible', true).order('ordre');
  if (error || !data) { showToast('Erreur chargement menu', true); return; }

  // Déterminer le service selon l'heure : avant 16h = Midi, sinon Soir
  const h = new Date().getHours();
  const isMidi = h >= 10 && h < 16;
  const prefix = isMidi ? 'Midi/' : '';
  const otherPrefix = isMidi ? '' : 'Midi/';

  // Catégories toujours visibles (midi et soir)
  const alwaysVisible = ['Softs','Vins Rouges','Vins Rosé & Blanc','Champagne'];

  // Filtrer les items du bon service
  const filtered = data.filter(item => {
    if (alwaysVisible.includes(item.categorie)) return true;
    if (item.categorie.startsWith('Midi/')) {
      return isMidi; // items Midi/ seulement le midi
    }
    // items sans préfixe (Soir) : seulement le soir
    return !isMidi;
  });

  // Grouper par catégorie en retirant le préfixe Midi/
  const cats = {};
  filtered.forEach(item => {
    const cat = item.categorie.replace(/^Midi\//, '');
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push({ ...item, categorie: cat });
  });

  // Indicateur service dans le header
  const serviceLabel = isMidi ? '🌞 Service Midi' : '🌙 Service Soir';
  const hdrEl = document.getElementById('hdr-table');
  if (hdrEl) hdrEl.title = serviceLabel;
  showToast(serviceLabel, false);

  // Ordre des onglets
  const catOrder = isMidi
    ? ['Entrées','Salades','Plats','Desserts','Softs','Vins Rouges','Vins Rosé & Blanc','Champagne']
    : ['Entrées','Tacos','Salades','Plats','Grands Formats','Desserts','Cocktails','Shots','Softs','Vins Rouges','Vins Rosé & Blanc','Champagne','Spiritueux'];

  const sortedCats = Object.entries(cats).sort(([a], [b]) => {
    const ai = catOrder.indexOf(a); const bi = catOrder.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });

  menu = sortedCats.map(([cat, items]) => ({ categorie: cat, items }));
  renderCatNav();
  if (menu.length) renderItems(menu[0].categorie);
}

// ──────────────────────────────────────────
// RENDER MENU
// ──────────────────────────────────────────
function renderCatNav() {
  const nav = document.getElementById('cat-nav');
  nav.innerHTML = menu.map(c => `
    <button class="cat-btn${c.categorie === currentCat ? ' active' : ''}"
      onclick="renderItems('${c.categorie.replace(/'/g,"\\'")}', this)">
      ${c.categorie}
    </button>`).join('');
  if (!currentCat && menu.length) {
    currentCat = menu[0].categorie;
    nav.querySelector('.cat-btn').classList.add('active');
  }
}

function renderItems(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const catData = menu.find(c => c.categorie === cat);
  if (!catData) return;

  const grid = document.getElementById('items-grid');
  grid.innerHTML = catData.items.map(item => {
    const inCart = cart.find(c => c.id === item.id);
    const qty = inCart ? inCart.quantite : 0;
    return `
    <div class="item-card${inCart ? ' in-cart' : ''}${!item.disponible ? ' dispo-false' : ''}"
         id="card-${item.id}"
         onclick="${item.disponible ? `addToCart(${item.id})` : ''}">
      <div class="item-emoji">${item.emoji || '🍽️'}</div>
      <div class="item-nom">${item.nom}</div>
      ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
      <div class="item-prix">${formatPrice(item.prix)}</div>
      <div class="item-qty-badge" id="badge-${item.id}" style="display:${qty > 0 ? 'flex' : 'none'}">${qty}</div>
    </div>`;
  }).join('');
}

// ──────────────────────────────────────────
// CART
// ──────────────────────────────────────────
function addToCart(itemId) {
  const allItems = menu.flatMap(c => c.items);
  const item = allItems.find(i => i.id === itemId);
  if (!item) return;

  const existing = cart.find(c => c.id === itemId);
  if (existing) {
    existing.quantite++;
  } else {
    cart.push({ id: item.id, nom: item.nom, categorie: item.categorie, prix: item.prix, quantite: 1, note: '' });
  }
  updateCardBadge(itemId);
  renderCart();
}

function updateCardBadge(itemId) {
  const card  = document.getElementById('card-' + itemId);
  const badge = document.getElementById('badge-' + itemId);
  const entry = cart.find(c => c.id === itemId);
  if (card)  card.classList.toggle('in-cart', !!entry);
  if (badge) { badge.style.display = entry ? 'flex' : 'none'; badge.textContent = entry ? entry.quantite : ''; }
}

function changeQty(itemId, delta) {
  const idx = cart.findIndex(c => c.id === itemId);
  if (idx === -1) return;
  cart[idx].quantite += delta;
  if (cart[idx].quantite <= 0) cart.splice(idx, 1);
  updateCardBadge(itemId);
  renderCart();
}

function removeItem(itemId) {
  cart = cart.filter(c => c.id !== itemId);
  updateCardBadge(itemId);
  renderCart();
}

function setNote(itemId, val) {
  const entry = cart.find(c => c.id === itemId);
  if (entry) entry.note = val;
}

function clearCart() {
  const ids = cart.map(c => c.id);
  cart = [];
  ids.forEach(id => updateCardBadge(id));
  renderCart();
}

function renderCart() {
  const container = document.getElementById('cart-items');
  const sendBtn   = document.getElementById('btn-send');
  const countEl   = document.getElementById('cart-count');
  const totalEl   = document.getElementById('cart-total');

  const totalQty = cart.reduce((s, c) => s + c.quantite, 0);
  const totalAmt = cart.reduce((s, c) => s + c.prix * c.quantite, 0);

  countEl.textContent = totalQty + ' article' + (totalQty > 1 ? 's' : '');
  totalEl.textContent = formatPrice(totalAmt);
  sendBtn.disabled = cart.length === 0;

  if (cart.length === 0) {
    container.innerHTML = '<div class="cart-empty-msg">Ajoutez des articles<br>depuis le menu.</div>';
    return;
  }

  container.innerHTML = cart.map(entry => `
    <div class="cart-row" id="crow-${entry.id}">
      <div class="cart-row-info" style="width:100%">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="cart-row-nom">${entry.nom}</div>
          <button class="qty-del" onclick="removeItem(${entry.id})" title="Retirer">✕</button>
        </div>
        <div class="cart-row-prix">${formatPrice(entry.prix)} × ${entry.quantite} = ${formatPrice(entry.prix * entry.quantite)}</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${entry.id}, -1)">−</button>
          <span class="qty-val">${entry.quantite}</span>
          <button class="qty-btn" onclick="changeQty(${entry.id}, +1)">+</button>
        </div>
        <textarea class="cart-row-note" placeholder="Note… (sans sauce, bien cuit…)"
          rows="2" onchange="setNote(${entry.id}, this.value)">${entry.note}</textarea>
      </div>
    </div>`).join('');
}

// ──────────────────────────────────────────
// SEND ORDER
// ──────────────────────────────────────────
async function sendOrder() {
  if (cart.length === 0) return;
  const btn = document.getElementById('btn-send');
  btn.disabled = true;
  btn.textContent = 'Envoi…';

  const total = cart.reduce((s, c) => s + c.prix * c.quantite, 0);
  const now   = new Date();
  const pad   = n => String(n).padStart(2, '0');
  const cmdId = 'CMD-' + now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate())
                + '-' + pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());
  const notes = document.getElementById('cart-notes').value.trim();

  // 1. Insert commande
  const { error: e1 } = await db.from('commandes_salle').insert({
    id: cmdId, table_nom: currentTable, serveur: currentServeur,
    statut: 'En attente', notes, total
  });
  if (e1) { showToast('Erreur envoi : ' + e1.message, true); btn.disabled = false; btn.textContent = 'Envoyer en cuisine ↗'; return; }

  // 2. Insert items
  const items = cart.map(c => ({
    commande_id: cmdId, nom: c.nom, categorie: c.categorie,
    prix: c.prix, quantite: c.quantite, notes: c.note
  }));
  const { error: e2 } = await db.from('commandes_salle_items').insert(items);
  if (e2) { showToast('Erreur items : ' + e2.message, true); btn.disabled = false; btn.textContent = 'Envoyer en cuisine ↗'; return; }

  // Success
  document.getElementById('screen-app').style.display     = 'none';
  document.getElementById('screen-confirm').style.display = 'flex';
  document.getElementById('confirm-sub').textContent   = `${currentTable} · ${currentServeur}`;
  document.getElementById('confirm-id').textContent    = cmdId;
  cart = [];
}

function newCmd() {
  document.getElementById('screen-confirm').style.display = 'none';
  document.getElementById('screen-app').style.display     = 'flex';
  document.getElementById('cart-notes').value = '';
  renderCart();
  // Refresh badges
  menu.flatMap(c => c.items).forEach(i => updateCardBadge(i.id));
  document.getElementById('btn-send').textContent = 'Envoyer en cuisine ↗';
}

// ──────────────────────────────────────────
// TABLE MODAL
// ──────────────────────────────────────────
let _tableModalInit = false;
function openTableModal(forceOpen) {
  const modal = document.getElementById('modal-table');
  document.getElementById('modal-table-inp').value = currentTable;
  modal.classList.add('open');
  if (forceOpen) document.getElementById('modal-cancel-btn').style.display = 'none';
  document.getElementById('modal-table-inp').focus();
}
function closeTableModal() {
  document.getElementById('modal-table').classList.remove('open');
  document.getElementById('modal-cancel-btn').style.display = '';
}
function confirmTable() {
  const val = document.getElementById('modal-table-inp').value.trim();
  if (!val) return;
  currentTable = val;
  document.getElementById('hdr-table').textContent = val;
  closeTableModal();
}

// ──────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────
function formatPrice(n) {
  return Number(n).toFixed(2).replace('.', ',') + ' €';
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isError ? 'error' : '';
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display = 'none', 3500);
}
</script>
