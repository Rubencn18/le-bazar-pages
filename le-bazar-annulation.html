<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annuler ma réservation — Le Bazar</title>
<style>
  :root {
    --brand: #e8510f;
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --border: #2e2e2e;
    --text: #f5f5f0;
    --muted: #888;
    --success: #22c55e;
    --error: #ef4444;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  .logo { font-size: 2rem; font-weight: 800; color: var(--brand); margin-bottom: 8px; }
  .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }
  h2 { font-size: 1.3rem; margin-bottom: 8px; }
  .resa-details {
    background: #111;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    text-align: left;
    margin: 24px 0;
  }
  .resa-details .row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.9rem; }
  .resa-details .label { color: var(--muted); }
  .resa-details .val { font-weight: 600; }
  .btn {
    display: inline-block;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    width: 100%;
    margin-top: 8px;
    transition: opacity .2s;
  }
  .btn:hover { opacity: .85; }
  .btn-danger { background: var(--error); color: #fff; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .icon-big { font-size: 3rem; margin-bottom: 16px; }
  .success-msg { color: var(--success); font-size: 1.1rem; font-weight: 600; }
  .error-msg { color: var(--error); font-size: 1rem; }
  .spinner {
    border: 3px solid var(--border);
    border-top-color: var(--brand);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    animation: spin .7s linear infinite;
    margin: 24px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer { margin-top: 24px; color: var(--muted); font-size: 0.75rem; }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="logo">Le Bazar</div>
  <div class="sub">Gestion de réservation</div>
  <div id="content">
    <div class="spinner"></div>
  </div>
</div>

<footer>25 Av. de l'Europe, 92300 Levallois-Perret · Tél. 01 47 58 00 73</footer>

<script>
const SUPABASE_URL = 'https://gtjvsrhblqwwnviledmo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0anZzcmhibHF3d252aWxlZG1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDE2OTY1NiwiZXhwIjoyMDg5NzQ1NjU2fQ.KScIJzmVLYZ_P9Z8vSOvD9qL7fY38a_ESMtKXDnVE8s';

async function sbFetch(endpoint, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': 'return=representation',
      ...(opts.headers || {})
    }
  });
  if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
  return res.json();
}

function formatDate(d) {
  if (!d) return '—';
  const [y, m, j] = d.split('-');
  const months = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];
  return `${parseInt(j)} ${months[parseInt(m)-1]} ${y}`;
}

async function init() {
  const params = new URLSearchParams(location.search);
  const token = params.get('token');
  const content = document.getElementById('content');

  if (!token) {
    content.innerHTML = `
      <div class="icon-big">❌</div>
      <p class="error-msg">Lien invalide ou expiré.</p>
      <p style="color:var(--muted);margin-top:12px;font-size:.9rem">Si vous souhaitez annuler, contactez-nous directement.</p>`;
    return;
  }

  // Chercher la réservation par token
  let resas;
  try {
    resas = await sbFetch(`reservations?cancel_token=eq.${encodeURIComponent(token)}&select=*`);
  } catch(e) {
    content.innerHTML = `<p class="error-msg">Erreur de connexion : ${e.message}</p>`;
    return;
  }

  if (!resas || resas.length === 0) {
    content.innerHTML = `
      <div class="icon-big">🔍</div>
      <p class="error-msg">Réservation introuvable.</p>
      <p style="color:var(--muted);margin-top:12px;font-size:.9rem">Ce lien est peut-être déjà utilisé ou invalide.</p>`;
    return;
  }

  const r = resas[0];

  // Déjà annulée ?
  if (r.statut === 'Annulée') {
    content.innerHTML = `
      <div class="icon-big">✅</div>
      <h2>Déjà annulée</h2>
      <p style="color:var(--muted);margin-top:8px">Cette réservation a déjà été annulée.</p>`;
    return;
  }

  // Afficher les détails + bouton de confirmation
  content.innerHTML = `
    <h2>Annuler votre réservation</h2>
    <p style="color:var(--muted);margin-top:6px;font-size:.9rem">Veuillez confirmer l'annulation de votre réservation.</p>
    <div class="resa-details">
      <div class="row"><span class="label">Nom</span><span class="val">${r.nom_client || '—'}</span></div>
      <div class="row"><span class="label">Date</span><span class="val">${formatDate(r.date_reservation)}</span></div>
      <div class="row"><span class="label">Heure</span><span class="val">${(r.heure || '—').substring(0,5)}</span></div>
      <div class="row"><span class="label">Couverts</span><span class="val">${r.nombre_personnes || '—'} pers.</span></div>
    </div>
    <button class="btn btn-danger" onclick="confirmCancel('${r.id}', '${token}')">
      Confirmer l'annulation
    </button>
    <button class="btn btn-secondary" onclick="window.close()">
      Garder ma réservation
    </button>`;
}

async function confirmCancel(id, token) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="spinner"></div>';

  try {
    await sbFetch(`reservations?id=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ statut: 'Annulée' })
    });
    content.innerHTML = `
      <div class="icon-big">✅</div>
      <p class="success-msg">Réservation annulée</p>
      <p style="color:var(--muted);margin-top:12px;font-size:.9rem">
        Votre réservation a bien été annulée. Nous espérons vous revoir bientôt !
      </p>`;
  } catch(e) {
    content.innerHTML = `
      <div class="icon-big">❌</div>
      <p class="error-msg">Erreur lors de l'annulation.</p>
      <p style="color:var(--muted);margin-top:8px;font-size:.85rem">${e.message}</p>
      <button class="btn btn-secondary" onclick="init()" style="margin-top:16px">Réessayer</button>`;
  }
}

init();
</script>
</body>
</html>
