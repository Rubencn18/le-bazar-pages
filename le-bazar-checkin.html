<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-in — Le Bazar</title>
<style>
  :root {
    --brand: #ff6614;
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #ffffff;
    --muted: #888;
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --blue: #38bdf8;
    --blue-dim: rgba(56,189,248,0.12);
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 20px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 36px 32px;
    max-width: 420px; width: 100%; text-align: center;
  }
  .logo { font-size: 1.6rem; font-weight: 800; color: var(--brand); letter-spacing: 3px; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 0.8rem; margin-bottom: 28px; }

  /* États */
  .icon-big { font-size: 3.5rem; margin-bottom: 16px; }
  .state-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
  .state-sub { color: var(--muted); font-size: 0.875rem; line-height: 1.5; }

  /* Fiche réservation */
  .resa-card {
    background: #111; border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 20px;
    text-align: left; margin: 20px 0;
  }
  .resa-name { font-size: 1.3rem; font-weight: 700; margin-bottom: 12px; color: var(--text); }
  .resa-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
  .resa-row:last-child { border-bottom: none; }
  .resa-label { color: var(--muted); }
  .resa-val { font-weight: 600; }
  .occasion-badge {
    display: inline-block; margin-top: 10px;
    padding: 4px 12px; border-radius: 20px;
    background: rgba(255,102,20,0.15); border: 1px solid rgba(255,102,20,0.4);
    color: var(--brand); font-size: 0.8rem; font-weight: 600;
  }

  /* Bouton confirm */
  .btn-confirm {
    width: 100%; padding: 16px; border: none;
    border-radius: 10px; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all .2s; letter-spacing: 0.5px;
    background: var(--green); color: #fff;
    box-shadow: 0 0 24px rgba(34,197,94,0.3);
  }
  .btn-confirm:hover { opacity: .88; transform: translateY(-1px); }
  .btn-confirm:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  /* Succès */
  .success-card { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.05); }
  .success-card .state-title { color: var(--green); }

  /* Déjà arrivé */
  .already-card { border-color: rgba(56,189,248,0.4); background: var(--blue-dim); }
  .already-card .state-title { color: var(--blue); }

  .spinner {
    border: 3px solid var(--border); border-top-color: var(--brand);
    border-radius: 50%; width: 40px; height: 40px;
    animation: spin .7s linear infinite; margin: 20px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer { margin-top: 20px; color: var(--muted); font-size: 0.72rem; }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="logo">LE BAZAR</div>
  <div class="sub">Check-in réservation</div>
  <div id="content"><div class="spinner"></div></div>
</div>

<footer>25 Av. de l'Europe, 92300 Levallois-Perret · Tél. 01 47 58 00 73</footer>

<script>
const SUPABASE_URL = 'https://gtjvsrhblqwwnviledmo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0anZzcmhibHF3d252aWxlZG1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDE2OTY1NiwiZXhwIjoyMDg5NzQ1NjU2fQ.KScIJzmVLYZ_P9Z8vSOvD9qL7fY38a_ESMtKXDnVE8s';

async function sbFetch(endpoint, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': 'return=representation',
      ...(opts.headers || {})
    }
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

function formatDate(d) {
  if (!d) return '—';
  const [y, m, j] = d.split('-');
  const months = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];
  return `${parseInt(j)} ${months[parseInt(m)-1]} ${y}`;
}

async function init() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const content = document.getElementById('content');

  if (!id) {
    content.innerHTML = `<div class="icon-big">❌</div><p class="state-title" style="color:var(--red)">Lien invalide</p>`;
    return;
  }

  let resas;
  try {
    resas = await sbFetch(`reservations?id=eq.${encodeURIComponent(id)}&select=*`);
  } catch(e) {
    content.innerHTML = `<p style="color:var(--red)">Erreur : ${e.message}</p>`;
    return;
  }

  if (!resas || resas.length === 0) {
    content.innerHTML = `<div class="icon-big">🔍</div><p class="state-title" style="color:var(--red)">Réservation introuvable</p>`;
    return;
  }

  const r = resas[0];

  // Déjà arrivé
  if (r.statut === 'Arrivé') {
    document.getElementById('card').classList.add('already-card');
    content.innerHTML = `
      <div class="icon-big">🟦</div>
      <p class="state-title">Déjà enregistré</p>
      <p class="state-sub">Ce client a déjà été marqué comme arrivé.</p>
      ${buildResaInfo(r)}`;
    return;
  }

  // Annulée ou No-show
  if (r.statut === 'Annulée' || r.statut === 'No-show') {
    content.innerHTML = `
      <div class="icon-big">❌</div>
      <p class="state-title" style="color:var(--red)">${r.statut}</p>
      <p class="state-sub">Cette réservation est ${r.statut.toLowerCase()}.</p>
      ${buildResaInfo(r)}`;
    return;
  }

  // Afficher la fiche + bouton check-in
  content.innerHTML = `
    ${buildResaInfo(r)}
    <button class="btn-confirm" id="btn-checkin" onclick="doCheckin('${r.id}')">
      ✅ Confirmer l'arrivée
    </button>`;
}

function buildResaInfo(r) {
  return `
    <div class="resa-card">
      <div class="resa-name">${r.nom_client || '—'}</div>
      <div class="resa-row"><span class="resa-label">Date</span><span class="resa-val">${formatDate(r.date_reservation)}</span></div>
      <div class="resa-row"><span class="resa-label">Heure</span><span class="resa-val">${(r.heure || '—').substring(0,5)}</span></div>
      <div class="resa-row"><span class="resa-label">Couverts</span><span class="resa-val">${r.nombre_personnes || '—'} pers.</span></div>
      <div class="resa-row"><span class="resa-label">Table</span><span class="resa-val">${r.table_assignee || '—'}</span></div>
      ${r.notes ? `<div class="resa-row"><span class="resa-label">Notes</span><span class="resa-val" style="font-size:0.8rem;max-width:60%;text-align:right">${r.notes}</span></div>` : ''}
      ${r.occasion ? `<div style="margin-top:8px"><span class="occasion-badge">${r.occasion}</span></div>` : ''}
    </div>`;
}

async function doCheckin(id) {
  const btn = document.getElementById('btn-checkin');
  btn.disabled = true;
  btn.textContent = 'Enregistrement…';
  try {
    await sbFetch(`reservations?id=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ statut: 'Arrivé' })
    });
    const content = document.getElementById('content');
    document.getElementById('card').classList.add('success-card');
    content.innerHTML = `
      <div class="icon-big">✅</div>
      <p class="state-title">Arrivée confirmée !</p>
      <p class="state-sub">Le statut de la réservation a été mis à jour.</p>
      ${buildResaInfo({ ...JSON.parse(document.getElementById('card').dataset.resa || '{}') })}`;

    // Récupérer les données fraîches pour afficher
    const updated = await sbFetch(`reservations?id=eq.${id}&select=*`);
    if (updated?.[0]) {
      content.innerHTML = `
        <div class="icon-big">✅</div>
        <p class="state-title">Arrivée confirmée !</p>
        <p class="state-sub" style="margin-bottom:4px">Bonne table et bon appétit 🍽️</p>
        ${buildResaInfo(updated[0])}`;
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '✅ Confirmer l\'arrivée';
    alert('Erreur : ' + e.message);
  }
}

init();
</script>
</body>
</html>
