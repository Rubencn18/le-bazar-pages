<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuisine | Le Bazar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --card: #1a1a1a; --border: #2a2a2a;
    --orange: #e87c3e; --yellow: #f5c518; --green: #22c55e; --red: #ef4444;
    --text: #f0f0f0; --muted: #666;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; }

  /* HEADER */
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-logo { font-size: 1.1rem; font-weight: 800; letter-spacing: 4px; }
  .header-subtitle { font-size: 0.7rem; letter-spacing: 3px; color: var(--orange); text-transform: uppercase; }
  .header-clock { font-size: 1.5rem; font-weight: 300; font-variant-numeric: tabular-nums; letter-spacing: 2px; }
  .header-stats { display: flex; gap: 12px; align-items: center; }
  .stat-pill {
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    padding: 6px 14px; font-size: 0.78rem; display: flex; align-items: center; gap: 6px;
  }
  .stat-pill .num { font-weight: 700; font-size: 1rem; }
  .stat-pill.orange { border-color: var(--orange); color: var(--orange); }
  .stat-pill.yellow { border-color: var(--yellow); color: var(--yellow); }
  .stat-pill.green  { border-color: var(--green);  color: var(--green);  }
  .btn-sound {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 20px; padding: 6px 12px; font-size: 0.8rem; cursor: pointer; transition: all 0.15s;
  }
  .btn-sound:hover, .btn-sound.on { border-color: var(--orange); color: var(--orange); }

  /* MAIN */
  .main { padding: 24px; }
  .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state .msg { font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; }

  /* GRID */
  .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; align-items: start; }

  /* ORDER CARD */
  .order-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; transition: border-color 0.3s, box-shadow 0.3s;
  }
  .order-card.attente { border-color: var(--orange); box-shadow: 0 0 16px rgba(232,124,62,0.15); animation: pulse-orange 2s infinite; }
  .order-card.en-cours { border-color: var(--yellow); box-shadow: 0 0 12px rgba(245,197,24,0.1); }
  .order-card.pret { border-color: var(--green); box-shadow: 0 0 20px rgba(34,197,94,0.25); animation: pulse-green 1.5s 3; }

  @keyframes pulse-orange {
    0%,100% { box-shadow: 0 0 16px rgba(232,124,62,0.15); }
    50%      { box-shadow: 0 0 30px rgba(232,124,62,0.4); }
  }
  @keyframes pulse-green {
    0%,100% { box-shadow: 0 0 12px rgba(34,197,94,0.2); }
    50%      { box-shadow: 0 0 36px rgba(34,197,94,0.55); }
  }

  .card-header {
    padding: 14px 16px 10px; display: flex; align-items: flex-start;
    justify-content: space-between; border-bottom: 1px solid var(--border);
  }
  .card-table { font-size: 2rem; font-weight: 900; letter-spacing: -1px; line-height: 1; }
  .card-meta { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
  .card-meta span { color: var(--text); }
  .card-right { text-align: right; }
  .card-timer {
    font-size: 0.85rem; font-weight: 600; font-variant-numeric: tabular-nums;
    padding: 4px 8px; border-radius: 6px; background: var(--border);
  }
  .card-timer.urgent { background: rgba(239,68,68,0.2); color: var(--red); }
  .card-timer.warn   { background: rgba(245,197,24,0.15); color: var(--yellow); }
  .card-status-badge { font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; margin-top: 6px; font-weight: 700; }

  /* ITEMS */
  .card-items { padding: 4px 0; }
  .item-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 16px;
    cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s; user-select: none;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: rgba(255,255,255,0.03); }
  .item-row.done { opacity: 0.35; }
  .item-check {
    width: 22px; height: 22px; border: 2px solid var(--muted); border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; transition: all 0.2s;
  }
  .item-row.done .item-check { background: var(--green); border-color: var(--green); }
  .item-qty {
    background: var(--border); color: var(--orange); font-weight: 800; font-size: 0.8rem;
    min-width: 26px; height: 26px; border-radius: 4px; display: flex; align-items: center; justify-content: center;
  }
  .item-info { flex: 1; min-width: 0; }
  .item-nom { font-size: 0.88rem; font-weight: 600; }
  .item-note { font-size: 0.72rem; color: var(--orange); margin-top: 2px; font-style: italic; }

  /* NOTES */
  .card-notes {
    padding: 8px 16px; background: rgba(232,124,62,0.06);
    border-top: 1px solid rgba(232,124,62,0.2); font-size: 0.78rem; color: var(--orange);
  }
  .card-notes-label { font-size: 0.62rem; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }

  /* ACTIONS */
  .card-actions { padding: 12px 16px; display: flex; gap: 8px; border-top: 1px solid var(--border); }
  .btn-tout-pret {
    flex: 1; background: var(--orange); color: #000; border: none; border-radius: 8px;
    padding: 10px; font-size: 0.82rem; font-weight: 800; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-tout-pret:hover { opacity: 0.85; }
  .btn-tout-pret.pret { background: var(--green); }
  .btn-archiver {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 10px 14px; font-size: 0.8rem; cursor: pointer; transition: all 0.15s;
  }
  .btn-archiver:hover { border-color: var(--muted); color: var(--text); }

  /* TOAST */
  #new-order-toast {
    position: fixed; top: 80px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--orange); color: #000; padding: 12px 28px; border-radius: 30px;
    font-weight: 800; font-size: 0.9rem; letter-spacing: 1px;
    opacity: 0; transition: all 0.3s; z-index: 999; pointer-events: none;
  }
  #new-order-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <div class="header-logo">LE BAZAR</div>
      <div class="header-subtitle">Cuisine</div>
    </div>
    <div class="header-clock" id="clock">--:--:--</div>
  </div>
  <div class="header-stats">
    <div class="stat-pill orange"><span class="num" id="count-attente">0</span> en attente</div>
    <div class="stat-pill yellow"><span class="num" id="count-encours">0</span> en cours</div>
    <div class="stat-pill green" ><span class="num" id="count-pret">0</span> prêt</div>
    <button class="btn-sound on" id="btn-sound" onclick="toggleSound()">🔔</button>
  </div>
</div>

<div class="main">
  <div id="empty-state" class="empty-state">
    <div class="icon">🍽️</div>
    <div class="msg">Aucune commande en cours</div>
  </div>
  <div class="orders-grid" id="orders-grid"></div>
</div>

<div id="new-order-toast">🔔 NOUVELLE COMMANDE</div>

<script>
const SUPA_URL  = 'https://gtjvsrhblqwwnviledmo.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0anZzcmhibHF3d252aWxlZG1vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNjk2NTYsImV4cCI6MjA4OTc0NTY1Nn0.Om-tFf8iIGsTXjWY4l95ApAF6hRP-s5ddsMco_0TPyM';
const db = supabase.createClient(SUPA_URL, SUPA_ANON);

let orders = [];
let soundOn = true;
let audioCtx = null;

// ── CLOCK
function updateClock() {
  const now = new Date(), pad = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent = pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
}
setInterval(updateClock, 1000); updateClock();

// Refresh timers every 15s
setInterval(() => {
  document.querySelectorAll('[data-created]').forEach(el => {
    el.textContent = formatTimer(el.dataset.created);
    const secs = (Date.now() - new Date(el.dataset.created)) / 1000;
    el.className = 'card-timer' + (secs > 900 ? ' urgent' : secs > 480 ? ' warn' : '');
  });
}, 15000);

// ── SOUND
function toggleSound() {
  soundOn = !soundOn;
  const btn = document.getElementById('btn-sound');
  btn.textContent = soundOn ? '🔔' : '🔕';
  btn.classList.toggle('on', soundOn);
}

function playBeep() {
  if (!soundOn) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    [880, 1100, 1320].forEach((freq, i) => {
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = freq; osc.type = 'sine';
      const t = audioCtx.currentTime + i * 0.18;
      gain.gain.setValueAtTime(0.3, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t); osc.stop(t + 0.3);
    });
  } catch(e) {}
}

function showNewOrderToast() {
  const t = document.getElementById('new-order-toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ── LOAD
async function loadOrders() {
  const { data: cmds } = await db.from('commandes_salle')
    .select('*').in('statut', ['En attente', 'En cours', 'Prêt']).order('created_at');
  if (!cmds || cmds.length === 0) { orders = []; render(); return; }

  const { data: items } = await db.from('commandes_salle_items')
    .select('*').in('commande_id', cmds.map(c => c.id)).order('id');

  orders = cmds.map(cmd => {
    const prev = orders.find(o => o.commande.id === cmd.id);
    const cmdItems = (items||[]).filter(i => i.commande_id === cmd.id);
    const doneItems = prev ? prev.doneItems : new Set(
      cmd.statut === 'Prêt' ? cmdItems.map(i => i.id) : []
    );
    return { commande: cmd, items: cmdItems, doneItems };
  });
  render();
}

// ── RENDER
function formatTimer(created) {
  const secs = Math.floor((Date.now() - new Date(created)) / 1000);
  const m = Math.floor(secs / 60), s = secs % 60;
  return (m > 0 ? m + 'min ' : '') + s + 's';
}

function render() {
  const grid = document.getElementById('orders-grid');
  const empty = document.getElementById('empty-state');
  let attente = 0, encours = 0, pret = 0;

  if (orders.length === 0) {
    grid.innerHTML = ''; empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    grid.innerHTML = orders.map(o => {
      const cmd = o.commande;
      const allDone = o.items.length > 0 && o.items.every(i => o.doneItems.has(i.id));
      const anyDone = o.items.some(i => o.doneItems.has(i.id));
      const displayStatut = allDone ? 'Prêt' : anyDone ? 'En cours' : 'En attente';
      if (displayStatut === 'Prêt') pret++;
      else if (displayStatut === 'En cours') encours++;
      else attente++;

      const cardClass = allDone ? 'pret' : anyDone ? 'en-cours' : 'attente';
      const statusColor = allDone ? 'var(--green)' : anyDone ? 'var(--yellow)' : 'var(--orange)';

      const itemsHtml = o.items.map(item => `
        <div class="item-row${o.doneItems.has(item.id)?' done':''}" onclick="toggleItem('${cmd.id}',${item.id})">
          <div class="item-check">${o.doneItems.has(item.id)?'✓':''}</div>
          <div class="item-qty">×${item.quantite}</div>
          <div class="item-info">
            <div class="item-nom">${item.nom}</div>
            ${item.notes?`<div class="item-note">⚠ ${item.notes}</div>`:''}
          </div>
        </div>`).join('');

      return `
        <div class="order-card ${cardClass}" id="card-${cmd.id}">
          <div class="card-header">
            <div>
              <div class="card-table">${cmd.table_nom}</div>
              <div class="card-meta">Serveur : <span>${cmd.serveur}</span></div>
              <div class="card-meta">${o.items.length} article${o.items.length>1?'s':''}</div>
            </div>
            <div class="card-right">
              <div class="card-timer" data-created="${cmd.created_at}">${formatTimer(cmd.created_at)}</div>
              <div class="card-status-badge" style="color:${statusColor}">${displayStatut}</div>
            </div>
          </div>
          <div class="card-items">${itemsHtml}</div>
          ${cmd.notes?`<div class="card-notes"><div class="card-notes-label">Note</div>${cmd.notes}</div>`:''}
          <div class="card-actions">
            <button class="btn-tout-pret${allDone?' pret':''}" onclick="markAllDone('${cmd.id}')">
              ${allDone ? '✓ Prêt — Archiver' : 'Tout prêt →'}
            </button>
            <button class="btn-archiver" onclick="archiveOrder('${cmd.id}')">Archiver</button>
          </div>
        </div>`;
    }).join('');
  }

  document.getElementById('count-attente').textContent = attente;
  document.getElementById('count-encours').textContent = encours;
  document.getElementById('count-pret').textContent    = pret;
}

// ── ACTIONS
function toggleItem(cmdId, itemId) {
  const o = orders.find(o => o.commande.id === cmdId); if (!o) return;
  if (o.doneItems.has(itemId)) o.doneItems.delete(itemId);
  else o.doneItems.add(itemId);
  const allDone = o.items.every(i => o.doneItems.has(i.id));
  const anyDone = o.items.some(i => o.doneItems.has(i.id));
  db.from('commandes_salle').update({ statut: allDone ? 'Prêt' : anyDone ? 'En cours' : 'En attente' }).eq('id', cmdId);
  render();
}

function markAllDone(cmdId) {
  const o = orders.find(o => o.commande.id === cmdId); if (!o) return;
  const allDone = o.items.every(i => o.doneItems.has(i.id));
  if (allDone) { archiveOrder(cmdId); return; }
  o.items.forEach(i => o.doneItems.add(i.id));
  db.from('commandes_salle').update({ statut: 'Prêt' }).eq('id', cmdId);
  render();
}

async function archiveOrder(cmdId) {
  await db.from('commandes_salle').update({ statut: 'Archivé' }).eq('id', cmdId);
  orders = orders.filter(o => o.commande.id !== cmdId);
  render();
}

// ── REALTIME
db.channel('cuisine-live')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'commandes_salle' }, () => {
    playBeep(); showNewOrderToast(); setTimeout(loadOrders, 400);
  })
  .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'commandes_salle' }, payload => {
    if (payload.new.statut === 'Archivé') {
      orders = orders.filter(o => o.commande.id !== payload.new.id); render();
    }
  })
  .subscribe();

loadOrders();
setInterval(loadOrders, 30000);
</script>
</body>
</html>
