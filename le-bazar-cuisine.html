<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Le Bazar — Cuisine</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a0a; --surface:#111; --surface2:#181818; --surface3:#1f1f1f;
      --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
      --text:#fff; --muted:#888; --orange:#ff6614; --orange-dim:rgba(255,102,20,0.15);
      --green:#4caf7d; --green-dim:rgba(76,175,125,0.12);
      --yellow:#f5c518; --yellow-dim:rgba(245,197,24,0.12);
      --red:#e05050;
    }
    html,body{height:100%;font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);font-size:13px;-webkit-font-smoothing:antialiased}
    button{cursor:pointer;font-family:inherit}

    /* ── HEADER ── */
    #header{
      height:56px;background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;padding:0 20px;
      position:sticky;top:0;z-index:100;
    }
    .hdr-left{display:flex;align-items:center;gap:20px}
    .hdr-logo{font-size:16px;font-weight:800;letter-spacing:5px}
    .hdr-tag{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase}
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    .hdr-right{display:flex;align-items:center;gap:10px}
    .filter-btn{
      padding:6px 14px;background:transparent;border:1px solid var(--border2);
      color:var(--muted);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
      transition:all .15s;
    }
    .filter-btn.active{background:var(--orange);border-color:var(--orange);color:#fff}
    .filter-btn:hover:not(.active){border-color:var(--orange);color:var(--orange)}
    #cmd-total-badge{
      background:var(--orange-dim);border:1px solid rgba(255,102,20,.3);color:var(--orange);
      padding:5px 12px;font-size:11px;font-weight:700;letter-spacing:1px;
    }

    /* ── BOARD ── */
    #board{
      padding:16px;display:flex;flex-wrap:wrap;gap:14px;align-content:flex-start;
      min-height:calc(100vh - 56px);
    }
    .empty-board{
      width:100%;text-align:center;padding:100px 20px;color:var(--muted);
    }
    .empty-board-icon{font-size:48px;margin-bottom:16px}
    .empty-board-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px}

    /* ── TICKET CARD ── */
    .ticket{
      background:var(--surface);border:1px solid var(--border);
      width:320px;flex:1;min-width:280px;max-width:400px;display:flex;flex-direction:column;
      position:relative;overflow:hidden;
      transition:border-color .3s, box-shadow .3s;
    }
    .ticket.statut-en-attente   { box-shadow:0 0 12px rgba(255,102,20,0.1); }
    .ticket.statut-en-preparation { box-shadow:0 0 12px rgba(245,197,24,0.1); }
    .ticket.statut-pret         { box-shadow:0 0 16px rgba(76,175,125,0.2); }
    @media(max-width:640px){ .ticket{ width:100%; } }
    .btn-statut { transition:all .15s; }
    .btn-statut:active { transform:scale(0.96); }
    .ticket::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .ticket.statut-en-attente::before{background:var(--orange)}
    .ticket.statut-en-preparation::before{background:var(--yellow)}
    .ticket.statut-pret::before{background:var(--green)}

    .ticket-header{
      padding:12px 14px 10px;border-bottom:1px solid var(--border);
      display:flex;align-items:flex-start;justify-content:space-between;gap:8px;
    }
    .ticket-table{font-size:18px;font-weight:800;letter-spacing:2px;color:var(--text)}
    .ticket-meta{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.5px}
    .ticket-status-pill{
      font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
      padding:3px 8px;border:1px solid;flex-shrink:0;
    }
    .statut-en-attente  .ticket-status-pill{color:var(--orange);border-color:rgba(255,102,20,.4);background:var(--orange-dim)}
    .statut-en-preparation .ticket-status-pill{color:var(--yellow);border-color:rgba(245,197,24,.4);background:var(--yellow-dim)}
    .statut-pret        .ticket-status-pill{color:var(--green);border-color:rgba(76,175,125,.4);background:var(--green-dim)}

    .ticket-items{padding:10px 14px;flex:1}
    .ticket-item{
      display:flex;justify-content:space-between;align-items:flex-start;
      padding:6px 0;border-bottom:1px solid var(--border);gap:8px;
    }
    .ticket-item:last-child{border-bottom:none}
    .ticket-item-name{font-size:13px;font-weight:600}
    .ticket-item-note{font-size:10px;color:var(--orange);margin-top:2px;font-style:italic}
    .ticket-item-qty{
      font-size:15px;font-weight:800;color:var(--orange);
      min-width:28px;text-align:right;flex-shrink:0;
    }

    .ticket-note-global{
      margin:0 14px 10px;padding:8px 10px;
      background:rgba(255,255,255,0.03);border:1px solid var(--border);border-left:2px solid var(--muted);
      font-size:11px;color:var(--muted);font-style:italic;
    }

    .ticket-footer{
      padding:10px 14px;border-top:1px solid var(--border);
      display:flex;gap:6px;flex-wrap:wrap;
    }
    .btn-statut{
      flex:1;padding:14px 6px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
      border:1px solid;transition:all .15s;min-height:48px;
    }
    .btn-en-prep{background:transparent;border-color:rgba(245,197,24,.4);color:var(--yellow)}
    .btn-en-prep:hover{background:var(--yellow-dim)}
    .btn-pret{background:transparent;border-color:rgba(76,175,125,.4);color:var(--green)}
    .btn-pret:hover{background:var(--green-dim)}
    .btn-print{
      padding:8px 10px;background:transparent;border:1px solid var(--border2);color:var(--muted);
      font-size:12px;transition:all .15s;
    }
    .btn-print:hover{border-color:var(--text);color:var(--text)}
    .btn-archive{
      width:100%;padding:7px;background:transparent;border:1px solid var(--border);color:var(--muted);
      font-size:10px;letter-spacing:1px;text-transform:uppercase;transition:all .15s;margin-top:2px;
    }
    .btn-archive:hover{border-color:var(--red);color:var(--red)}
    .ticket-time{
      font-size:10px;font-weight:600;font-variant-numeric:tabular-nums;
      padding:3px 8px;border-radius:4px;background:var(--surface3);letter-spacing:.5px;
    }
    .ticket-time.warn   { color:var(--yellow);background:var(--yellow-dim); }
    .ticket-time.urgent { color:var(--red);background:rgba(224,80,80,0.15); }

    /* ── STOCK PANEL ── */
    #stock-overlay{
      display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;
      align-items:flex-start;justify-content:flex-end;
    }
    #stock-overlay.open{display:flex}
    #stock-panel{
      width:380px;height:100vh;background:var(--surface);border-left:1px solid var(--border2);
      display:flex;flex-direction:column;overflow:hidden;
    }
    .stock-hdr{
      padding:16px 20px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
    }
    .stock-hdr-title{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
    .stock-close{background:transparent;border:none;color:var(--muted);font-size:20px;line-height:1;padding:4px;}
    .stock-close:hover{color:var(--text)}
    .stock-body{flex:1;overflow-y:auto;padding:12px 0;}
    .stock-cat{padding:8px 20px 4px;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;border-top:1px solid var(--border);margin-top:4px;}
    .stock-cat:first-child{border-top:none;margin-top:0;}
    .stock-item{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 20px;transition:background .1s;
    }
    .stock-item:hover{background:rgba(255,255,255,0.03)}
    .stock-item-nom{font-size:12px;font-weight:500;flex:1}
    .stock-toggle{
      position:relative;width:44px;height:24px;flex-shrink:0;
    }
    .stock-toggle input{opacity:0;width:0;height:0;position:absolute}
    .stock-slider{
      position:absolute;inset:0;border-radius:12px;cursor:pointer;
      background:var(--border2);transition:background .2s;
    }
    .stock-slider::before{
      content:'';position:absolute;width:18px;height:18px;border-radius:50%;
      left:3px;top:3px;background:#fff;transition:transform .2s;
    }
    .stock-toggle input:checked + .stock-slider{background:var(--green)}
    .stock-toggle input:checked + .stock-slider::before{transform:translateX(20px)}
    .stock-rupture-tag{
      font-size:9px;font-weight:700;letter-spacing:1px;color:var(--red);
      text-transform:uppercase;margin-right:10px;
    }
    .btn-stocks{
      padding:5px 12px;background:transparent;border:1px solid var(--border2);
      color:var(--muted);font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
      transition:all .15s;
    }
    .btn-stocks:hover{border-color:var(--orange);color:var(--orange)}
    .btn-stocks .rupture-count{
      background:var(--red);color:#fff;border-radius:10px;
      padding:1px 6px;font-size:9px;margin-left:6px;display:none;
    }

    /* ── TOAST ── */
    #toast{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      background:#1a1a1a;border:1px solid var(--border2);border-left:3px solid var(--green);
      padding:10px 20px;font-size:12px;font-weight:600;letter-spacing:.5px;
      z-index:9999;display:none;white-space:nowrap;
    }

    /* ══════════════════════════════════════════
       PRINT STYLES — ticket 80mm
    ══════════════════════════════════════════ */
    @media print {
      * { color: #000 !important; background: #fff !important; border-color: #ccc !important; }
      body { margin: 0; font-family: 'Courier New', monospace; font-size: 12px; }
      #header, #board, #toast { display: none !important; }
      #print-zone { display: block !important; }
      @page { size: 80mm auto; margin: 4mm; }
    }
    #print-zone { display: none; }

    .print-ticket {
      width: 72mm; font-family: 'Courier New', monospace; font-size: 12px;
    }
    .print-header {
      text-align: center; border-bottom: 1px dashed #000;
      padding-bottom: 8px; margin-bottom: 8px;
    }
    .print-restaurant { font-size: 16px; font-weight: bold; letter-spacing: 4px; }
    .print-sub { font-size: 10px; }
    .print-info { margin-bottom: 8px; border-bottom: 1px dashed #000; padding-bottom: 6px; }
    .print-info-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
    .print-info-label { font-weight: bold; }
    .print-items { margin-bottom: 8px; }
    .print-item { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .print-item-left { flex: 1; }
    .print-item-note { font-size: 10px; font-style: italic; padding-left: 8px; }
    .print-item-qty { font-weight: bold; min-width: 24px; text-align: right; }
    .print-total { border-top: 1px dashed #000; padding-top: 6px; margin-top: 4px; font-weight: bold; }
    .print-footer { text-align: center; margin-top: 10px; font-size: 10px; border-top: 1px dashed #000; padding-top: 6px; }
  </style>
</head>
<body>

<!-- HEADER -->
<header id="header">
  <div class="hdr-left">
    <div class="hdr-logo">LE BAZAR</div>
    <div class="hdr-tag">🍳 Cuisine</div>
    <div class="live-dot" id="live-dot"></div>
  </div>
  <div class="hdr-right">
    <span id="cmd-total-badge">0 commande</span>
    <button class="filter-btn active" id="filter-all"   onclick="setFilter('all')">Tout</button>
    <button class="filter-btn"        id="filter-att"   onclick="setFilter('En attente')">En attente</button>
    <button class="filter-btn"        id="filter-prep"  onclick="setFilter('En préparation')">En prép.</button>
    <button class="filter-btn"        id="filter-pret"  onclick="setFilter('Prêt')">Prêt</button>
    <button class="btn-stocks" onclick="openStocks()">📦 Stocks <span class="rupture-count" id="rupture-count">0</span></button>
  </div>
</header>

<!-- BOARD -->
<div id="board">
  <div class="empty-board">
    <div class="empty-board-icon">🍽️</div>
    <div class="empty-board-title">Aucune commande active</div>
    <div>Les commandes apparaissent ici en temps réel.</div>
  </div>
</div>

<!-- STOCK PANEL -->
<div id="stock-overlay" onclick="e => { if(e.target===this) closeStocks() }">
  <div id="stock-panel">
    <div class="stock-hdr">
      <div class="stock-hdr-title">📦 Gestion des stocks</div>
      <button class="stock-close" onclick="closeStocks()">✕</button>
    </div>
    <div class="stock-body" id="stock-body">Chargement…</div>
  </div>
</div>

<!-- PRINT ZONE (hidden, injected before print) -->
<div id="print-zone"></div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const SUPA_URL  = 'https://gtjvsrhblqwwnviledmo.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0anZzcmhibHF3d252aWxlZG1vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNjk2NTYsImV4cCI6MjA4OTc0NTY1Nn0.Om-tFf8iIGsTXjWY4l95ApAF6hRP-s5ddsMco_0TPyM';

const db = supabase.createClient(SUPA_URL, SUPA_ANON);

let commandes   = [];   // local cache [{...commande, items:[]}]
let currentFilter = 'all';

// ── INIT ──────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  await loadCommandes();
  subscribeRealtime();
});

// ── LOAD ──────────────────────────────────
async function loadCommandes() {
  const { data, error } = await db
    .from('commandes_salle')
    .select('*, commandes_salle_items(*)')
    .not('statut', 'eq', 'Archivé')
    .order('created_at', { ascending: true });

  if (error) { showToast('Erreur chargement'); return; }
  commandes = (data || []).map(c => ({ ...c, items: c.commandes_salle_items || [] }));
  renderBoard();
}

// ── REALTIME ──────────────────────────────
function subscribeRealtime() {
  db.channel('cuisine-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'commandes_salle' }, async payload => {
      await loadCommandes();
      if (payload.eventType === 'INSERT') {
        playBell();
        showToast(`🆕 Nouvelle commande — ${payload.new.table_nom}`);
      }
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'commandes_salle_items' }, () => {
      loadCommandes();
    })
    .subscribe(status => {
      document.getElementById('live-dot').style.background =
        status === 'SUBSCRIBED' ? 'var(--green)' : 'var(--muted)';
    });
}

// ── TIMER LIVE ────────────────────────────
function elapsedLabel(created_at) {
  const secs = Math.floor((Date.now() - new Date(created_at)) / 1000);
  const m = Math.floor(secs / 60), s = secs % 60;
  return m > 0 ? `${m}min ${String(s).padStart(2,'0')}s` : `${s}s`;
}

function elapsedClass(created_at) {
  const secs = (Date.now() - new Date(created_at)) / 1000;
  if (secs > 900) return 'urgent';
  if (secs > 480) return 'warn';
  return '';
}

setInterval(() => {
  commandes.forEach(c => {
    const el = document.getElementById('timer-' + c.id);
    if (!el) return;
    el.textContent = elapsedLabel(c.created_at);
    el.className = 'ticket-time ' + elapsedClass(c.created_at);
  });
}, 5000);

// ── RENDER ────────────────────────────────
function renderBoard() {
  const board = document.getElementById('board');
  const badge = document.getElementById('cmd-total-badge');

  let displayed = commandes;
  if (currentFilter !== 'all') displayed = commandes.filter(c => c.statut === currentFilter);

  const activeCount = commandes.filter(c => c.statut !== 'Archivé').length;
  badge.textContent = activeCount + ' commande' + (activeCount > 1 ? 's' : '');

  if (displayed.length === 0) {
    board.innerHTML = `<div class="empty-board">
      <div class="empty-board-icon">🍽️</div>
      <div class="empty-board-title">${currentFilter === 'all' ? 'Aucune commande active' : 'Aucune commande «' + currentFilter + '»'}</div>
      <div>Les commandes apparaissent ici en temps réel.</div>
    </div>`;
    return;
  }

  board.innerHTML = displayed.map(c => ticketHTML(c)).join('');
}

function statutClass(s) {
  if (s === 'En attente')     return 'statut-en-attente';
  if (s === 'En préparation') return 'statut-en-preparation';
  if (s === 'Prêt')           return 'statut-pret';
  return '';
}

function ticketHTML(c) {
  const time = c.created_at
    ? new Date(c.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })
    : '';

  const itemsHTML = (c.items || []).map(it => `
    <div class="ticket-item">
      <div>
        <div class="ticket-item-name">${it.nom}</div>
        ${it.notes ? `<div class="ticket-item-note">↳ ${it.notes}</div>` : ''}
      </div>
      <div class="ticket-item-qty">×${it.quantite}</div>
    </div>`).join('');

  const noteHTML = c.notes
    ? `<div class="ticket-note-global">📝 ${c.notes}</div>` : '';

  const btnPrep = c.statut === 'En attente'
    ? `<button class="btn-statut btn-en-prep" onclick="updateStatut('${c.id}', 'En préparation')">▶ En prép.</button>` : '';
  const btnPret = c.statut !== 'Prêt'
    ? `<button class="btn-statut btn-pret" onclick="updateStatut('${c.id}', 'Prêt')">✓ Prêt</button>` : '';

  return `
  <div class="ticket ${statutClass(c.statut)}" id="ticket-${c.id}">
    <div class="ticket-header">
      <div>
        <div class="ticket-table">${c.table_nom}</div>
        <div class="ticket-meta">${c.serveur ? c.serveur + ' · ' : ''}${time}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
        <div class="ticket-status-pill">${c.statut}</div>
        <div class="ticket-time" id="timer-${c.id}">${elapsedLabel(c.created_at)}</div>
      </div>
    </div>
    <div class="ticket-items">${itemsHTML}</div>
    ${noteHTML}
    <div class="ticket-footer">
      ${btnPrep}${btnPret}
      <button class="btn-print" onclick="printTicket('${c.id}')" title="Imprimer">🖨️</button>
    </div>
    <button class="btn-archive" onclick="archiveCmd('${c.id}')">✕ Archiver</button>
  </div>`;
}

// ── ACTIONS ───────────────────────────────
async function updateStatut(cmdId, newStatut) {
  // Optimistic update — immédiat côté UI
  const c = commandes.find(x => x.id === cmdId);
  if (c) c.statut = newStatut;
  if (newStatut === 'Prêt') playPretSound();
  renderBoard();
  // Puis synchro Supabase en arrière-plan
  db.from('commandes_salle').update({ statut: newStatut, updated_at: new Date().toISOString() }).eq('id', cmdId);
}

async function archiveCmd(cmdId) {
  await db.from('commandes_salle').update({ statut: 'Archivé', updated_at: new Date().toISOString() }).eq('id', cmdId);
  commandes = commandes.filter(c => c.id !== cmdId);
  renderBoard();
}

// ── FILTER ────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  ['all','att','prep','pret'].forEach(k => document.getElementById('filter-' + k)?.classList.remove('active'));
  const map = { all:'filter-all', 'En attente':'filter-att', 'En préparation':'filter-prep', 'Prêt':'filter-pret' };
  document.getElementById(map[f])?.classList.add('active');
  renderBoard();
}

// ── PRINT ─────────────────────────────────
function printTicket(cmdId) {
  const c = commandes.find(x => x.id === cmdId);
  if (!c) return;

  const now = new Date();
  const time = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  const date = now.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit' });
  const total = (c.items || []).reduce((s, it) => s + it.prix * it.quantite, 0);

  const itemsHTML = (c.items || []).map(it => `
    <div class="print-item">
      <div class="print-item-left">
        <div>${it.nom}</div>
        ${it.notes ? `<div class="print-item-note">↳ ${it.notes}</div>` : ''}
      </div>
      <div class="print-item-qty">×${it.quantite}</div>
    </div>`).join('');

  document.getElementById('print-zone').innerHTML = `
  <div class="print-ticket">
    <div class="print-header">
      <div class="print-restaurant">LE BAZAR</div>
      <div class="print-sub">Bon de commande cuisine</div>
    </div>
    <div class="print-info">
      <div class="print-info-row"><span class="print-info-label">TABLE</span><span>${c.table_nom}</span></div>
      <div class="print-info-row"><span class="print-info-label">SERVEUR</span><span>${c.serveur || '—'}</span></div>
      <div class="print-info-row"><span class="print-info-label">N° CMD</span><span>${c.id}</span></div>
      <div class="print-info-row"><span class="print-info-label">HEURE</span><span>${date} ${time}</span></div>
    </div>
    <div class="print-items">${itemsHTML}</div>
    ${c.notes ? `<div style="margin-top:6px;font-style:italic;font-size:11px;border-top:1px dashed #000;padding-top:4px;">📝 ${c.notes}</div>` : ''}
    <div class="print-footer">— LE BAZAR · Levallois-Perret —</div>
  </div>`;

  window.print();
}

// ── BELL (nouvelle commande) ───────────────
function playBell() {
  try {
    const ctx = new AudioContext();
    // Double ping pour signaler une nouvelle commande
    [0, 0.22].forEach(t => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = 880;
      gain.gain.setValueAtTime(0, ctx.currentTime + t);
      gain.gain.linearRampToValueAtTime(0.35, ctx.currentTime + t + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.20);
      osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.24);
    });
  } catch(e) {}
}

// ── FANFARE (commande prête) ───────────────
function playPretSound() {
  try {
    const ctx = new AudioContext();
    // Montée joyeuse C5-E5-G5-C6
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.11);
      gain.gain.linearRampToValueAtTime(0.22, ctx.currentTime + i * 0.11 + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.11 + 0.22);
      osc.start(ctx.currentTime + i * 0.11);
      osc.stop(ctx.currentTime + i * 0.11 + 0.26);
    });
  } catch(e) {}
}

// ── STOCKS ────────────────────────────────
let allMenuItems = [];

async function openStocks() {
  document.getElementById('stock-overlay').classList.add('open');
  const { data } = await db.from('menu').select('id,nom,categorie,disponible').order('categorie').order('ordre');
  allMenuItems = data || [];
  renderStocks();
}

function closeStocks() {
  document.getElementById('stock-overlay').classList.remove('open');
}

function renderStocks() {
  const body = document.getElementById('stock-body');
  const cats = {};
  allMenuItems.forEach(item => {
    if (!cats[item.categorie]) cats[item.categorie] = [];
    cats[item.categorie].push(item);
  });

  body.innerHTML = Object.entries(cats).map(([cat, items]) => `
    <div class="stock-cat">${cat.replace('Midi/', '🌞 ')||cat}</div>
    ${items.map(item => `
      <div class="stock-item">
        <div class="stock-item-nom">${item.nom}</div>
        ${!item.disponible ? '<span class="stock-rupture-tag">Rupture</span>' : ''}
        <label class="stock-toggle">
          <input type="checkbox" ${item.disponible ? 'checked' : ''} onchange="toggleStock(${item.id}, this.checked)">
          <span class="stock-slider"></span>
        </label>
      </div>`).join('')}
  `).join('');

  updateRuptureCount();
}

async function toggleStock(itemId, disponible) {
  // Optimistic
  const item = allMenuItems.find(i => i.id === itemId);
  if (item) item.disponible = disponible;
  renderStocks();
  await db.from('menu').update({ disponible }).eq('id', itemId);
}

function updateRuptureCount() {
  const n = allMenuItems.filter(i => !i.disponible).length;
  const badge = document.getElementById('rupture-count');
  badge.textContent = n;
  badge.style.display = n > 0 ? 'inline' : 'none';
}

// ── TOAST ─────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display = 'none', 4000);
}
</script>
